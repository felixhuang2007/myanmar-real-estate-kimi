name: Frontend Web CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'frontend-web/**'
      - '.github/workflows/frontend-web-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'frontend-web/**'

env:
  NODE_VERSION: '20'
  BUILD_OUTPUT: 'dist'

jobs:
  # ============================================
  # 阶段1: 代码检查
  # ============================================
  lint:
    name: Code Lint & Format Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend-web

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: './frontend-web/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check code format
        run: npm run format:check

      - name: Run TypeScript type check
        run: npm run type-check

  # ============================================
  # 阶段2: 单元测试
  # ============================================
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: ./frontend-web

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: './frontend-web/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:ci

      - name: Upload coverage report
        uses: codecov/codecov-action@v3
        with:
          files: ./frontend-web/coverage/lcov.info
          flags: frontend-web
          name: frontend-web-coverage

  # ============================================
  # 阶段3: 构建应用
  # ============================================
  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: ./frontend-web

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: './frontend-web/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Build for development
        if: github.ref == 'refs/heads/develop'
        run: npm run build:dev
        env:
          VITE_API_BASE_URL: ${{ secrets.DEV_API_URL }}
          VITE_APP_ENV: development

      - name: Build for production
        if: github.ref == 'refs/heads/main'
        run: npm run build:prod
        env:
          VITE_API_BASE_URL: ${{ secrets.PROD_API_URL }}
          VITE_APP_ENV: production

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-web-dist
          path: ./frontend-web/${{ env.BUILD_OUTPUT }}
          retention-days: 1

  # ============================================
  # 阶段4: 部署到CDN (开发环境)
  # ============================================
  deploy-dev:
    name: Deploy to CDN (Dev)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    environment:
      name: development
      url: https://dev.myanmarestate.com

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-web-dist
          path: ./dist

      # 方案1: 部署到 AWS S3 + CloudFront
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Deploy to S3
        run: |
          aws s3 sync ./dist s3://${{ secrets.DEV_S3_BUCKET }}/ --delete
          aws s3 cp ./dist/index.html s3://${{ secrets.DEV_S3_BUCKET }}/index.html --metadata-directive REPLACE --cache-control max-age=0,no-cache

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ secrets.DEV_CLOUDFRONT_ID }} --paths "/*"

      # 方案2: 部署到阿里云 OSS + CDN (中国/东南亚优化)
      # - name: Setup Alibaba Cloud CLI
      #   uses: aliyun/setup-aliyun-cli@v1
      #   with:
      #     access-key-id: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
      #     access-key-secret: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
      #     region: ap-southeast-1
      #
      # - name: Deploy to OSS
      #   run: |
      #     aliyun oss cp ./dist oss://${{ secrets.DEV_OSS_BUCKET }}/ --recursive --force
      #     aliyun oss set-meta oss://${{ secrets.DEV_OSS_BUCKET }}/index.html Cache-Control:no-cache

  # ============================================
  # 阶段5: 部署到CDN (生产环境)
  # ============================================
  deploy-prod:
    name: Deploy to CDN (Production)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://www.myanmarestate.com

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-web-dist
          path: ./dist

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Deploy to S3
        run: |
          aws s3 sync ./dist s3://${{ secrets.PROD_S3_BUCKET }}/ --delete
          aws s3 cp ./dist/index.html s3://${{ secrets.PROD_S3_BUCKET }}/index.html --metadata-directive REPLACE --cache-control max-age=0,no-cache

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ secrets.PROD_CLOUDFRONT_ID }} --paths "/*"

      - name: Notify deployment
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "🚀 Frontend Web deployed to production CDN",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Frontend Web Deployment Complete*\nURL: https://www.myanmarestate.com\nCommit: ${{ github.sha }}\nBy: ${{ github.actor }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
