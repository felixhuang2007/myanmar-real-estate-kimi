# ============================================
# Docker Compose - 测试环境基础设施
# 缅甸房产平台测试环境配置
# ============================================

version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: myanmarhome-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: test123
      POSTGRES_DB: myanmarhome
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - myanmarhome-network

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: myanmarhome-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - myanmarhome-network

  # ElasticSearch (搜索服务)
  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: myanmarhome-elasticsearch
    restart: unless-stopped
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - myanmarhome-network

  # MinIO 对象存储
  minio:
    image: minio/minio:latest
    container_name: myanmarhome-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    networks:
      - myanmarhome-network

# 数据卷
volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:
  minio_data:

# 网络
networks:
  myanmarhome-network:
    driver: bridge
