# ============================================
# Docker Compose - 本地开发环境
# 缅甸房产平台开发环境配置
# ============================================

version: '3.8'

services:
  # ============================================
  # 后端 API 服务
  # ============================================
  backend:
    build:
      context: ../backend
      dockerfile: ../devops/docker/Dockerfile.backend
      target: development
    container_name: myanmarestate-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ../backend:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/myanmarestate
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-jwt-secret-key
      JWT_EXPIRES_IN: 7d
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - myanmarestate-network

  # ============================================
  # PostgreSQL 数据库
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: myanmarestate-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: myanmarestate
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - myanmarestate-network

  # ============================================
  # Redis 缓存
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: myanmarestate-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - myanmarestate-network

  # ============================================
  # MinIO 对象存储 (替代 AWS S3)
  # ============================================
  minio:
    image: minio/minio:latest
    container_name: myanmarestate-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - myanmarestate-network

  # ============================================
  # Nginx 反向代理
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: myanmarestate-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
      - ../frontend-web/dist:/usr/share/nginx/html/web:ro
    depends_on:
      - backend
    networks:
      - myanmarestate-network

  # ============================================
  # 前端 Web 开发服务器
  # ============================================
  frontend-web:
    build:
      context: ../frontend-web
      dockerfile: ../devops/docker/Dockerfile.frontend-web
      target: development
    container_name: myanmarestate-frontend-web
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ../frontend-web:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
      VITE_API_BASE_URL: http://localhost:3000
    networks:
      - myanmarestate-network

  # ============================================
  # 管理后台
  # ============================================
  admin-web:
    build:
      context: ../admin-web
      dockerfile: ../devops/docker/Dockerfile.admin-web
      target: development
    container_name: myanmarestate-admin-web
    restart: unless-stopped
    ports:
      - "5174:5173"
    volumes:
      - ../admin-web:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
      VITE_API_BASE_URL: http://localhost:3000
    networks:
      - myanmarestate-network

  # ============================================
  # ElasticSearch (搜索服务)
  # ============================================
  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: myanmarestate-elasticsearch
    restart: unless-stopped
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - myanmarestate-network

  # ============================================
  # Kibana (日志分析)
  # ============================================
  kibana:
    image: kibana:8.11.0
    container_name: myanmarestate-kibana
    restart: unless-stopped
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: '["http://elasticsearch:9200"]'
    depends_on:
      - elasticsearch
    networks:
      - myanmarestate-network

  # ============================================
  # Prometheus (监控)
  # ============================================
  prometheus:
    image: prom/prometheus:latest
    container_name: myanmarestate-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - myanmarestate-network

  # ============================================
  # Grafana (监控可视化)
  # ============================================
  grafana:
    image: grafana/grafana:latest
    container_name: myanmarestate-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    networks:
      - myanmarestate-network

# ============================================
# 数据卷
# ============================================
volumes:
  postgres_data:
  redis_data:
  minio_data:
  elasticsearch_data:
  prometheus_data:
  grafana_data:

# ============================================
# 网络
# ============================================
networks:
  myanmarestate-network:
    driver: bridge
