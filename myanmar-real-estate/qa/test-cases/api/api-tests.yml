# ==================== 房源模块API ====================

用例ID: API-021
模块: 房源API-搜索
接口: GET /v1/houses/search
标题: 房源搜索接口
请求参数:
  transactionType: string # sale/rent
  cityCode: string
  districtCode: string # 可选
  priceMin: number # 可选
  priceMax: number # 可选
  areaMin: number # 可选
  areaMax: number # 可选
  roomCount: string # 可选
  houseType: string # 可选
  keywords: string # 可选
  sortBy: string # default/price_asc/price_desc/date/area
  page: int
  pageSize: int
预期结果:
  status: 200
  data:
    total: int
    page: int
    pageSize: int
    list:
      - houseId: string
        title: string
        coverImage: string
        price: number
        priceUnit: string
        area: number
        rooms: string
        location: string
        tags: string[]
        verificationStatus: string
测试场景:
  - 基础搜索
  - 多条件筛选
  - 关键词搜索
  - 排序
  - 分页
  - 结果为空
优先级: P0

