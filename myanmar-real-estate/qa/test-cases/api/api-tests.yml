# 接口测试用例
# 覆盖模块：用户模块、房源模块、IM消息、预约带看、ACN分佣、核验任务、客户管理
# 最后更新: 2026-03-22 (URL前缀统一为 /v1/, 新增经纪人/核验/客户端点)

---
# ==================== 用户模块API ====================

用例ID: API-001
模块: 用户API-注册登录
接口: POST /v1/user/register
标题: 用户注册接口
请求参数:
  phone: string # +959123456789
  verifyCode: string # 6位数字
  password: string # 可选
预期结果:
  status: 200
  data:
    userId: string
    token: string
    expiresAt: timestamp
    isNewUser: true
测试场景:
  - 正常注册
  - 手机号已注册
  - 验证码错误 # BUG-001修复后应返回400
  - 验证码过期
  - 手机号格式错误
优先级: P0

用例ID: API-002
模块: 用户API-注册登录
接口: POST /v1/user/login
标题: 用户登录接口
请求参数:
  phone: string
  verifyCode: string
  # 或
  phone: string
  password: string
预期结果:
  status: 200
  data:
    userId: string
    token: string
    expiresAt: timestamp
测试场景:
  - 验证码登录成功
  - 密码登录成功
  - 账号不存在
  - 验证码错误 # BUG-001修复后应返回400
  - 密码错误
  - 账号被禁用
优先级: P0

用例ID: API-003
模块: 用户API-注册登录
接口: POST /v1/user/verify-code/send
标题: 发送验证码接口
请求参数:
  phone: string
  type: string # register/login/reset_password
预期结果:
  status: 200
  data:
    sendInterval: 60 # 下次可发送间隔
测试场景:
  - 发送成功
  - 发送过于频繁
  - 手机号格式错误
  - 单日发送超限
优先级: P0

用例ID: API-004
模块: 用户API-用户信息
接口: GET /v1/user/profile
标题: 获取用户信息
请求头:
  Authorization: Bearer {token}
预期结果:
  status: 200
  data:
    userId: string
    phone: string
    nickname: string
    avatar: string
    realName: string
    identityStatus: string # unverified/pending/verified/rejected
    createdAt: timestamp
测试场景:
  - Token有效
  - Token过期
  - Token无效
优先级: P0

用例ID: API-005
模块: 用户API-用户信息
接口: POST /v1/user/identity/verify
标题: 实名认证接口
请求头:
  Authorization: Bearer {token}
请求参数:
  realName: string
  idCardNumber: string
  idCardFront: file
  idCardBack: file
预期结果:
  status: 200
  data:
    verifyId: string
    status: pending
    estimatedTime: timestamp
测试场景:
  - 提交成功
  - 身份证已被使用
  - 图片上传失败
  - OCR识别失败
