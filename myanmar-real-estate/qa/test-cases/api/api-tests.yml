    houseId: string
    title: string
    images: string[]
    video: string
    price: number
    priceUnit: string
    priceNote: string
    tags: string[]
    basicInfo: object
    location: object
    features: object
    property: object
    verification: object
    agent: object
测试场景:
  - 获取成功
