# ==================== Flutter平台通道测试 ====================

用例ID: COMP-013
模块: 平台通道兼容性
标题: Flutter与原生平台通道测试
测试场景:
  - MethodChannel调用原生地图SDK
  - EventChannel接收原生推送
  - BasicMessageChannel与IM SDK通信
测试内容:
  - 地图初始化（google_maps_flutter插件）
  - 定位获取（geolocator插件）
  - 相机调用（camera插件）
  - 相册选择（image_picker插件）
  - 推送接收（firebase_messaging插件）
  - 支付调用（platform channel自定义）
异常测试:
  - 平台通道调用超时
  - 原生端返回异常
  - 跨平台数据序列化问题
预期结果:
  - 平台通道调用成功
  - 数据传递正确
  - 异常有捕获处理
  - 无内存泄漏
优先级: P0

用例ID: COMP-014
模块: Flutter性能测试
标题: Flutter渲染性能测试
测试项:
  - 页面打开帧率（FPS）
  - 列表滚动流畅度
  - 图片加载性能
  - 内存占用
  - 包体积大小
测试场景:
  - 房源列表页快速滚动
  - 地图页缩放操作
  - 图片大图浏览
  - IM聊天记录加载
性能指标:
  - FPS >= 55
  - 内存增长 < 100MB/小时
  - 冷启动时间 < 3秒
  - APK/IPA大小合理（Flutter引擎约5MB）
预期结果:
  - 性能指标达标
  - 无明显卡顿
  - 内存无泄漏
优先级: P0

