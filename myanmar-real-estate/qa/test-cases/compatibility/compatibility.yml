用例ID: COMP-003
模块: 设备兼容性-B端Android(Flutter)
标题: B端APP Flutter Android兼容性
测试设备:
  - Samsung Galaxy S23 (Android 13)
  - Samsung Galaxy A34 (Android 13)
  - Xiaomi 13 (Android 13)
  - OPPO Reno8 (Android 12)
Flutter特定测试项:
  - 相机水印（自定义Painter实现）
  - GPS定位（geolocator插件）
  - 离线数据存储（sqflite插件）
测试内容:
  - 录房功能（图片压缩上传）
  - 验真拍照（camera插件+水印）
  - 客户管理（本地数据库同步）
  - 带看管理（日历组件）
  - 业绩统计（图表插件）
预期结果:
  - 拍照水印正常（Flutter Canvas绘制）
  - GPS定位准确（平台通道调用原生）
  - 离线模式可用（sqflite本地存储）
  - 后台定位权限申请正常
优先级: P0

用例ID: COMP-004
模块: 设备兼容性-Flutter引擎差异
标题: Flutter引擎版本兼容性
测试Flutter版本:
  - Flutter 3.16 (稳定版)
  - Flutter 3.19 (最新版)
测试项:
  - 渲染引擎差异（Skia vs Impeller）
  - Dart语言特性兼容性
  - 第三方插件版本兼容
预期结果:
  - 指定Flutter版本编译通过
  - 无废弃API警告
  - 渲染一致性
优先级: P1

