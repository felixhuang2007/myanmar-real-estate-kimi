# ==================== 系统版本兼容性（Flutter） ====================

用例ID: COMP-011
模块: 系统兼容性-Flutter Android版本
标题: Flutter Android系统版本兼容
测试版本:
  - Android 14 (API 34)
  - Android 13 (API 33)
  - Android 12 (API 31)
  - Android 11 (API 30)
  - Android 10 (API 29)
  - Android 9 (API 28) - 最低支持版本
Flutter特定测试项:
  - Flutter引擎最低版本要求
  - 平台通道兼容性
  - 插件API级别适配
测试重点:
  - 权限申请（存储、位置、相机、麦克风）
  - 通知权限（Android 13+，Flutter本地通知）
  - 后台限制（Android 10+）
  - Scoped Storage (Android 10+)
  - Flutter渲染兼容性
预期结果:
  - 各版本功能正常
  - 权限申请适配
  - 存储访问正常
  - Flutter渲染无差异
优先级: P0

用例ID: COMP-012
模块: 系统兼容性-Flutter iOS版本
标题: Flutter iOS系统版本兼容
测试版本:
  - iOS 17
  - iOS 16
  - iOS 15
  - iOS 14 - 最低支持版本
Flutter特定测试项:
  - Flutter对iOS 14+的适配
  - Impeller渲染引擎（iOS 16+）
测试重点:
  - ATT权限申请（iOS 14.5+，Flutter app_tracking_transparency插件）
  - 推送通知权限（firebase_messaging）
  - 照片访问权限（image_picker）
  - 定位权限（geolocator）
  - 隐私清单文件（iOS 17+）
预期结果:
  - 各版本功能正常
  - 权限申请适配
  - 隐私合规
  - 通过App Store审核
优先级: P0

