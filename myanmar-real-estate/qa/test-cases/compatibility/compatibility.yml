# 兼容性测试用例（Flutter适配版）
# 覆盖：设备兼容性、系统兼容性、网络兼容性、分辨率兼容性
# 技术栈：Flutter跨平台框架
# 注意：Flutter应用使用Dart语言开发，通过平台通道调用原生功能

---
# ==================== 设备兼容性（Flutter） ====================

用例ID: COMP-001
模块: 设备兼容性-C端Android(Flutter)
标题: Flutter Android主流机型测试
测试设备:
  - Samsung Galaxy S23 (Android 13)
  - Samsung Galaxy A54 (Android 13)
  - Xiaomi 13 (Android 13)
  - Xiaomi Redmi Note 12 (Android 12)
  - OPPO Find X6 (Android 13)
  - vivo X90 (Android 13)
  - Huawei P60 (HarmonyOS 3.1)
  - Google Pixel 7 (Android 13)
Flutter特定测试项:
  - Flutter引擎启动速度
  - Skia渲染性能
  - 平台通道调用（地图、推送、IM）
  - 图片加载（cached_network_image插件）
测试内容:
  - APP安装/卸载（APK大小检查）
  - 注册/登录流程
  - 房源浏览和搜索
  - 地图找房（Flutter地图插件）
  - IM聊天（Flutter IM SDK集成）
  - 图片上传（image_picker插件）
  - 推送通知（firebase_messaging插件）
预期结果:
  - 所有功能正常运行
  - UI显示正常无错位
  - 性能流畅无卡顿（FPS>55）
  - Flutter热重载不影响Release包
优先级: P0

