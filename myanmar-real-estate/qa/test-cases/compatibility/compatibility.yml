模块: 设备兼容性-C端iOS(Flutter)
标题: Flutter iOS主流机型测试
测试设备:
  - iPhone 15 Pro Max (iOS 17)
  - iPhone 15 (iOS 17)
  - iPhone 14 Pro (iOS 17)
  - iPhone 13 (iOS 16)
  - iPhone 12 (iOS 16)
  - iPhone SE 3 (iOS 17)
Flutter特定测试项:
  - iOS Skia/Impeller渲染后端
  - iOS平台通道性能
  - 苹果推送服务集成
测试内容:
  - APP安装/卸载（IPA大小检查）
  - 注册/登录流程
  - 房源浏览和搜索
  - 地图找房
