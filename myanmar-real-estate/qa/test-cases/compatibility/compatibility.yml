# ==================== 兼容性测试工具建议 ====================

自动化测试工具:
  - BrowserStack: 云真机测试
  - AWS Device Farm: AWS设备测试
  - Firebase Test Lab: Google测试服务
  - Appium: 自动化测试框架

手动测试设备清单:
  最低配置:
    Android:
      - 高端机: Samsung S系列 / Xiaomi 数字系列
      - 中端机: Samsung A系列 / Redmi Note系列
      - 最低版本: Android 9 (API 28)
    iOS:
      - 最新款: iPhone 15系列
      - 旧款: iPhone 12/13系列
      - 最低版本: iOS 14

网络测试工具:
  - Charles Proxy: 网络抓包和模拟
  - Network Link Conditioner: 弱网模拟(iOS)
  - Clumsy: Windows弱网模拟
