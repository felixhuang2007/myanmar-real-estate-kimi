version: '3.8'

services:
  # PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: myanmar_postgres
    restart: always
    environment:
      POSTGRES_DB: myanmar_property
      POSTGRES_USER: myanmar_property
      POSTGRES_PASSWORD: ${DB_PASSWORD:-myanmar_property_2024}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./01-database-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    networks:
      - myanmar_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myanmar_property"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: myanmar_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-myanmar_redis_2024}
    volumes:
      - redis_data:/data
    networks:
      - myanmar_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Elasticsearch
  elasticsearch:
    image: elasticsearch:8.12.0
    container_name: myanmar_elasticsearch
    restart: always
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - myanmar_net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Go API
  api:
    build:
      context: .
      dockerfile: 08-Dockerfile
    container_name: myanmar_api
    restart: always
    environment:
      - ENVIRONMENT=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=myanmar_property
      - DB_PASSWORD=${DB_PASSWORD:-myanmar_property_2024}
      - DB_NAME=myanmar_property
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-myanmar_redis_2024}
      - ES_HOSTS=http://elasticsearch:9200
      - JWT_SECRET=${JWT_SECRET}
      - SERVER_PORT=8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    networks:
      - myanmar_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: myanmar_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - uploads_data:/var/www/uploads:ro
    depends_on:
      - api
    networks:
      - myanmar_net

volumes:
  postgres_data:
  redis_data:
  es_data:
  uploads_data:

networks:
  myanmar_net:
    driver: bridge
