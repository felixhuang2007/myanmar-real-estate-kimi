version: '3.8'

# 适用于 2核2G 低配服务器的配置（无Elasticsearch，搜索功能将使用数据库LIKE查询）

services:
  # PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: myanmar_postgres
    restart: always
    environment:
      POSTGRES_DB: myanmar_property
      POSTGRES_USER: myanmar_property
      POSTGRES_PASSWORD: ${DB_PASSWORD:-myanmar_property_2024}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./01-database-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    networks:
      - myanmar_net
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myanmar_property"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: myanmar_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-myanmar_redis_2024}
    volumes:
      - redis_data:/data
    networks:
      - myanmar_net
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Go API（无ES配置）
  api:
    build:
      context: .
      dockerfile: 08-Dockerfile
    container_name: myanmar_api
    restart: always
    environment:
      - MYANMAR_PROPERTY_ENVIRONMENT=production
      - MYANMAR_PROPERTY_SERVER_PORT=8080
      - MYANMAR_PROPERTY_DATABASE_HOST=postgres
      - MYANMAR_PROPERTY_DATABASE_PORT=5432
      - MYANMAR_PROPERTY_DATABASE_USER=myanmar_property
      - MYANMAR_PROPERTY_DATABASE_PASSWORD=${DB_PASSWORD:-myanmar_property_2024}
      - MYANMAR_PROPERTY_DATABASE_DATABASE=myanmar_property
      - MYANMAR_PROPERTY_REDIS_HOST=redis
      - MYANMAR_PROPERTY_REDIS_PORT=6379
      - MYANMAR_PROPERTY_REDIS_PASSWORD=${REDIS_PASSWORD:-myanmar_redis_2024}
      - MYANMAR_PROPERTY_ELASTICSEARCH_HOSTS=      # 留空，不使用ES
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    networks:
      - myanmar_net
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Web Admin (React SPA)
  web-admin:
    build:
      context: ../frontend/web-admin
      dockerfile: Dockerfile
    container_name: myanmar_web_admin
    restart: always
    networks:
      - myanmar_net
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: myanmar_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - uploads_data:/var/www/uploads:ro
    depends_on:
      - api
      - web-admin
    networks:
      - myanmar_net
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M

volumes:
  postgres_data:
  redis_data:
  uploads_data:

networks:
  myanmar_net:
    driver: bridge
