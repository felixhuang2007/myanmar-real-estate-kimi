name: myanmarhome
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # 状态管理
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  
  # 路由管理
  go_router: ^13.0.1
  
  # 网络请求
  dio: ^5.4.0
  retrofit: ^4.0.3
  json_annotation: ^4.8.1
  
  # 本地存储
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  
  # 地图
  flutter_map: ^6.0.0
  latlong2: ^0.9.0
  
  # UI组件
  cached_network_image: ^3.3.0
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  pull_to_refresh_flutter3: ^2.0.2
  flutter_staggered_grid_view: ^0.7.0
  flutter_slidable: ^3.0.1
  fluttertoast: ^8.2.4
  flutter_screenutil: ^5.9.0
  
  # 图片选择
  image_picker: ^1.0.7
  photo_view: ^0.14.0
  
  # 日期选择
  flutter_picker: ^2.1.0
  table_calendar: ^3.0.9
  
  # 工具
  intl: ^0.18.1
  equatable: ^2.0.5
  freezed_annotation: ^2.4.1
  logger: ^2.0.2+1
  permission_handler: ^11.1.0
  url_launcher: ^6.2.2
  share_plus: ^7.2.1
  package_info_plus: ^5.0.1
  device_info_plus: ^9.1.1
  
  # 验证码输入
  pinput: ^3.0.1
  
  # 轮播图
  flutter_carousel_widget: ^2.2.0

  # 图表
  fl_chart: ^0.66.0

  # 下拉刷新
  flutter_easyrefresh: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  freezed: ^2.4.5
  json_serializable: ^6.7.1
  retrofit_generator: ^8.0.6
  riverpod_generator: ^2.3.9
  hive_generator: ^2.0.1
  change_app_package_name: ^1.1.0

flutter:
  generate: true
  uses-material-design: true

  fonts:
    - family: NotoSansMyanmar
      fonts:
        - asset: assets/fonts/NotoSansMyanmar-Regular.ttf
        - asset: assets/fonts/NotoSansMyanmar-Bold.ttf
          weight: 700
  #   - family: NotoSans
  #     fonts:
  #       - asset: assets/fonts/NotoSans-Regular.ttf
  #       - asset: assets/fonts/NotoSans-Bold.ttf
  #         weight: 700

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/

# Flavor配置
flavorizr:
  flavors:
    buyer:
      app:
        name: "缅甸房产"
      android:
        applicationId: "com.myanmarhome.buyer"
      ios:
        bundleId: "com.myanmarhome.buyer"
    agent:
      app:
        name: "缅甸房产经纪人"
      android:
        applicationId: "com.myanmarhome.agent"
      ios:
        bundleId: "com.myanmarhome.agent"
