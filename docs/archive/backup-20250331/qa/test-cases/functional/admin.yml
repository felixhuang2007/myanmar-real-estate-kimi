# 管理后台功能测试用例
# 覆盖模块：用户管理、房源审核、数据看板、财务结算

---
# ==================== 用户管理模块 ====================

用例ID: TC-A-001
模块: 后台-用户管理
标题: C端用户列表查询
前置条件: 管理员已登录
测试步骤:
  1. 进入"用户管理"-"C端用户"
  2. 查看用户列表
  3. 按手机号搜索用户
  4. 按注册时间筛选
  5. 按认证状态筛选
预期结果:
  1. 列表展示用户ID、手机号、昵称、注册时间、认证状态
  2. 搜索功能正常
  3. 分页展示，支持导出
优先级: P0

用例ID: TC-A-002
模块: 后台-用户管理
标题: C端用户详情查看
前置条件: 在用户列表页
测试步骤:
  1. 点击用户查看详情
  2. 查看基本信息
  3. 查看实名认证信息
  4. 查看行为记录（浏览、收藏、预约）
预期结果:
  1. 展示用户完整信息
  2. 身份证照片可查看
  3. 操作记录可追溯
优先级: P0

用例ID: TC-A-003
模块: 后台-用户管理
标题: 用户实名认证审核
前置条件: 有待审核的实名认证
测试步骤:
  1. 查看实名认证申请
  2. 核对身份证信息
  3. 点击"通过"
  4. 或点击"拒绝"并填写原因
预期结果:
  1. 身份证OCR信息展示
  2. 照片可放大查看
  3. 审核结果同步到APP
  4. 拒绝需说明原因
优先级: P0

用例ID: TC-A-004
模块: 后台-用户管理
标题: 用户状态管理
前置条件: 有正常用户
测试步骤:
  1. 选择用户点击"禁用"
  2. 填写禁用原因
  3. 确认禁用
  4. 点击"启用"
预期结果:
  1. 禁用后用户无法登录
  2. 提示"账号已被禁用"
  3. 启用后恢复正常
  4. 操作记录留痕
优先级: P0

用例ID: TC-A-005
模块: 后台-用户管理
标题: B端经纪人列表查询
前置条件: 管理员已登录
测试步骤:
  1. 进入"用户管理"-"B端经纪人"
  2. 查看经纪人列表
  3. 按公司/门店筛选
  4. 按审核状态筛选
  5. 按活跃度排序
预期结果:
  1. 展示经纪人姓名、手机号、公司、状态、业绩
  2. 支持多维度筛选
  3. 可导出数据
优先级: P0

用例ID: TC-A-006
模块: 后台-用户管理
标题: 经纪人入驻审核
前置条件: 有待审核的经纪人申请
测试步骤:
  1. 查看入驻申请列表
  2. 查看申请人信息
  3. 查看身份证照片
  4. 点击"通过"
  5. 或点击"拒绝"并填写原因
预期结果:
  1. 展示完整申请信息
  2. 审核通过后经纪人可登录
  3. 拒绝后需重新申请
  4. 审核结果Push通知申请人
优先级: P0

用例ID: TC-A-007
模块: 后台-用户管理
标题: 经纪人公司/门店管理
前置条件: 管理员已登录
测试步骤:
  1. 进入"公司管理"
  2. 添加新公司
  3. 编辑公司信息
  4. 添加门店
  5. 分配经纪人到门店
预期结果:
  1. 公司信息包含名称、地址、联系人
  2. 一个公司可有多个门店
  3. 经纪人归属到具体门店
  4. 支持公司/门店启用禁用
优先级: P1

用例ID: TC-A-008
模块: 后台-用户管理
标题: 权限管理-RBAC
前置条件: 管理员已登录
测试步骤:
  1. 进入"权限管理"
  2. 创建角色：超级管理员/运营/财务/客服
  3. 分配菜单权限
  4. 分配数据权限
  5. 创建用户分配角色
预期结果:
  1. 支持自定义角色
  2. 菜单权限精确到按钮
  3. 数据权限可按区域隔离
  4. 权限变更实时生效
优先级: P0

