# ==================== 房源管理模块 ====================

用例ID: TC-A-021
模块: 后台-房源审核
标题: 房源待审核列表
前置条件: 有经纪人提交房源
测试步骤:
  1. 进入"房源管理"-"房源审核"
  2. 查看待审核列表
  3. 按城市/镇区筛选
  4. 按提交时间排序
预期结果:
  1. 展示房源标题、价格、区域、提交人、提交时间
  2. 展示房源缩略图
  3. 支持批量操作
优先级: P0

用例ID: TC-A-022
模块: 后台-房源审核
标题: 房源详情审核
前置条件: 有待审核房源
测试步骤:
  1. 点击房源查看详情
  2. 查看房源图片
  3. 核对房源信息
  4. 查看经纪人信息
  5. 点击"通过"
  6. 或点击"拒绝"并选择原因
预期结果:
  1. 图片可放大查看
  2. 检查图片质量和内容合规
  3. 价格合理性提示（对比均价）
  4. 拒绝可选原因或填写自定义原因
优先级: P0

用例ID: TC-A-023
模块: 后台-房源审核
标题: 图片质量检测
前置条件: 在房源审核页
测试步骤:
  1. 查看房源图片
  2. 检测图片模糊度过低
  3. 检测图片违规内容
  4. 检测无水印图片
预期结果:
  1. AI辅助检测图片质量
  2. 违规图片自动标记
  3. 无水印图片提示补充
  4. 质量不达标可拒绝
优先级: P1

用例ID: TC-A-024
模块: 后台-房源审核
标题: 房源批量审核
前置条件: 有多条待审核房源
测试步骤:
  1. 勾选多条房源
  2. 点击"批量通过"
  3. 或点击"批量拒绝"
预期结果:
  1. 选中房源批量处理
  2. 操作结果分别反馈
  3. 支持批量导出
优先级: P1

用例ID: TC-A-025
模块: 后台-房源管理
标题: 房源列表管理
前置条件: 管理员已登录
测试步骤:
  1. 进入"房源管理"-"房源列表"
  2. 按状态筛选：在售/已售/已下架/审核中
  3. 按区域筛选
  4. 按价格区间筛选
  5. 关键词搜索
预期结果:
  1. 展示所有房源
  2. 支持多维度筛选
  3. 列表展示关键信息
  4. 支持导出Excel
优先级: P0

用例ID: TC-A-026
模块: 后台-房源管理
标题: 房源上下架操作
前置条件: 有在售房源
测试步骤:
  1. 选择房源点击"下架"
  2. 填写下架原因
  3. 确认下架
  4. 选择已下架房源点击"上架"
预期结果:
  1. 下架后房源不在C端展示
  2. 下架原因记录留痕
  3. 上架需重新审核（超过30天）
优先级: P0

用例ID: TC-A-027
模块: 后台-房源管理
标题: 房源价格监控
前置条件: 房源已上架
测试步骤:
  1. 查看价格异常房源列表
  2. 设置价格监控规则
  3. 查看价格变更记录
预期结果:
  1. 识别明显偏离市场价的房源
  2. 价格大幅变动自动预警
  3. 价格修改历史可追溯
优先级: P1

用例ID: TC-A-028
模块: 后台-房源管理
标题: 房源验真任务派发
前置条件: 有已上架房源
测试步骤:
  1. 选择房源发起验真
  2. 选择验真员
  3. 设置验真期限
  4. 派发任务
预期结果:
  1. 任务派发给指定验真员
  2. 验真员收到任务通知
  3. 超期未验真自动提醒
优先级: P0

用例ID: TC-A-029
模块: 后台-房源管理
标题: 验真报告审核
前置条件: 验真员已提交报告
测试步骤:
  1. 查看验真报告
  2. 查看验真照片
  3. 核对验真结果
  4. 点击"通过"或"驳回重验"
预期结果:
  1. 报告内容完整展示
  2. 照片可查看原图
  3. 通过后房源显示验真标识
  4. 驳回需说明原因
优先级: P0

