# ==================== 实地验真模块 ====================

用例ID: TC-B-021
模块: B端验真-任务接收
标题: 验真任务接收
前置条件: 经纪人有验真员角色
测试步骤:
  1. 收到新验真任务Push通知
  2. 进入"验真任务"页面
  3. 查看任务列表
  4. 点击"领取任务"
预期结果:
  1. 任务基于LBS就近分配
  2. 显示房源地址、业主联系方式
  3. 需在24小时内领取
  4. 领取后状态变为"验真中"
优先级: P0

用例ID: TC-B-022
模块: B端验真-现场拍照
标题: 验真拍照规范
前置条件: 已领取验真任务
测试步骤:
  1. 到达现场
  2. 拍摄楼体外景（含楼栋号）
  3. 拍摄入户门（含门牌号）
  4. 拍摄客厅、主卧、厨房、卫生间
  5. 拍摄产权文件关键页
  6. 拍摄业主身份证
预期结果:
  1. 每张照片自动添加水印：平台名+验真专用+时间戳
  2. 照片清晰度校验
  3. 楼栋号、门牌号必须清晰可见
  4. 未按要求拍摄提示重拍
优先级: P0

用例ID: TC-B-023
模块: B端验真-信息核对
标题: 验真信息核对表单
前置条件: 已完成现场拍照
测试步骤:
  1. 核对房源地址一致性
  2. 核对房源面积（实地测量或产权证核对）
  3. 核对户型与实际是否一致
  4. 确认产权类型
  5. 核对产权人身份
  6. 确认是否有抵押/查封
  7. 确认业主出售/出租意愿
  8. 确认挂牌价格与业主期望一致
预期结果:
  1. 逐项核对并勾选确认
  2. 发现问题可备注说明
  3. 许可证地块需额外确认原始所有权人
优先级: P0

用例ID: TC-B-024
模块: B端验真-结果判定
标题: 验真结果提交
前置条件: 完成所有验真项
测试步骤:
  1. 所有验真项通过，选择"通过"
  2. 发现重大问题，选择"不通过"
  3. 部分存疑，选择"存疑"并说明
  4. 提交验真报告
预期结果:
  1. 通过后房源显示"已验真"标识
  2. 不通过需填写具体原因
  3. 存疑转人工复核
  4. 验真报告生成，包含所有照片和核对结果
优先级: P0

用例ID: TC-B-025
模块: B端验真-特殊产权
标题: 许可证地块验真
前置条件: 房源为许可证类型
测试步骤:
  1. 核实许可证原件
  2. 核实原始所有权人或其法定继承人
  3. 记录许可证转让的特殊流程和风险
  4. 在报告中特别提示
预期结果:
  1. 许可证验真有额外确认项
  2. 报告中显示风险提示
  3. C端展示特殊产权说明
优先级: P0

用例ID: TC-B-026
模块: B端验真-任务时效
标题: 验真任务时效控制
前置条件: 已领取任务
测试步骤:
  1. 领取任务后超过48小时未完成
预期结果:
  1. 任务自动回收
  2. 记录超时次数
  3. 多次超时取消验真员资格
优先级: P1

