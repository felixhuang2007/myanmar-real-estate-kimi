# B端APP功能测试用例
# 覆盖模块：录房、验真、房源管理、客户管理、带看、ACN、业绩

---
# ==================== 账号与入驻模块 ====================

用例ID: TC-B-001
模块: B端账号-注册
标题: 经纪人注册流程
前置条件: 未注册手机号
测试步骤:
  1. 打开B端APP
  2. 选择"注册经纪人"
  3. 输入手机号获取验证码
  4. 填写个人信息：姓名、身份证号
  5. 上传身份证正反面
  6. 选择所属公司/门店（如有）
  7. 提交注册
预期结果:
  1. 信息提交成功
  2. 显示"审核中"状态
  3. 等待平台审核（T+1工作日）
优先级: P0

用例ID: TC-B-002
模块: B端账号-审核
标题: 经纪人入驻审核
前置条件: 已提交注册申请
测试步骤:
  1. 后台审核通过
  2. 后台审核拒绝
预期结果:
  1. 审核通过：收到通知，可正常登录使用
  2. 审核拒绝：收到拒绝原因，可修改后重新提交
优先级: P0

用例ID: TC-B-003
模块: B端账号-登录
标题: 经纪人登录
前置条件: 已注册并通过审核
测试步骤:
  1. 输入注册手机号
  2. 输入验证码
  3. 登录成功
预期结果:
  1. 登录成功进入首页
  2. 显示今日待办、业绩概览
优先级: P0

---
# ==================== 极速录房模块 ====================

用例ID: TC-B-011
模块: B端录房-基础录入
标题: 房源信息完整录入
前置条件: 经纪人已登录
测试步骤:
  1. 点击"录房"
  2. 选择交易类型：出售/出租
  3. 选择房源类型：公寓/独栋/联排/土地/商业
  4. 填写标题（30字以内）
  5. 填写价格（出售：万缅币/出租：万缅币/月）
  6. 填写面积（平米）
  7. 选择户型
  8. 选择镇区
  9. 填写详细地址
  10. 填写业主姓名和电话
  11. 选择楼层、装修、朝向
  12. 填写房源描述
预期结果:
  1. 所有必填项校验
  2. 价格、面积只能输入数字
  3. 地址组件展示缅甸镇区列表
  4. 业主电话格式校验
优先级: P0

用例ID: TC-B-012
模块: B端录房-图片上传
标题: 批量上传房源图片
前置条件: 在录房页面
测试步骤:
  1. 点击"添加图片"
  2. 选择多张图片（最少5张，最多20张）
  3. 查看自动添加的水印
  4. 调整图片顺序
  5. 删除某张图片
预期结果:
  1. 批量选择图片
  2. 自动添加水印：经纪人姓名+手机号+时间
  3. 图片压缩后上传（单张<500KB）
  4. 可拖拽调整顺序
  5. 首图必须是室内图
优先级: P0

用例ID: TC-B-013
模块: B端录房-地图标注
标题: 房源位置标注
前置条件: 在录房页面
测试步骤:
  1. 点击"标注位置"
  2. 自动获取当前GPS位置
  3. 在地图上拖动校正位置
  4. 确认位置
预期结果:
  1. 自动定位到当前位置
  2. 地图可缩放、拖动
  3. 位置校正后显示经纬度
  4. 位置信息随表单提交
优先级: P0

用例ID: TC-B-014
模块: B端录房-草稿箱
标题: 录房草稿保存
前置条件: 在录房页面
测试步骤:
  1. 填写部分房源信息
  2. 点击"保存草稿"
  3. 退出APP
  4. 重新进入，从草稿箱继续
预期结果:
  1. 草稿保存成功
  2. 草稿保留7天
  3. 可在草稿箱列表查看、编辑、删除
优先级: P1

用例ID: TC-B-015
模块: B端录房-产权信息
标题: 产权类型选择
前置条件: 在录房页面
测试步骤:
  1. 选择产权类型：地契(ဂရန်)
  2. 选择产权类型：许可证(လိုင်စင်)
  3. 选择产权类型：合同转让
  4. 选择产权类型：其他
预期结果:
  1. 支持缅甸特殊产权类型选择
  2. 不同产权类型显示对应提示
  3. 许可证类型需额外确认原始所有权人
优先级: P0

用例ID: TC-B-016
模块: B端录房-提交审核
标题: 房源提交审核
前置条件: 房源信息填写完整
测试步骤:
  1. 确认所有必填项已填
  2. 确认图片≥5张
  3. 点击"提交审核"
预期结果:
  1. 表单校验通过
  2. 提交成功，状态变为"审核中"
  3. 在"我的房源"中可查看状态
  4. 审核中的房源不可编辑
优先级: P0

