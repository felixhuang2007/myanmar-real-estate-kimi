用例ID: TC-B-046
模块: B端客户管理-保护期
标题: 客户保护期规则
前置条件: 客户登记超过30天
测试步骤:
  1. 客户登记后30天内未成交
预期结果:
  1. 保护期内其他经纪人不可跟进
  2. 超过30天客户释放到公客池
  3. 释放前3天提醒经纪人
优先级: P1

