用例ID: TC-B-045
模块: B端客户管理-客户标签
标题: 客户标签管理
前置条件: 有客户数据（二期功能）
测试步骤:
  1. 选择客户
  2. 添加标签：高意向/急需/投资客等
  3. 按标签筛选客户
预期结果:
  1. 支持自定义标签
  2. 可按标签快速筛选
  3. 标签用于客户分类管理
