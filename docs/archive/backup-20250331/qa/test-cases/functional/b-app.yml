# ==================== 房源管理模块 ====================

用例ID: TC-B-031
模块: B端房源管理-列表
标题: 我的房源列表
前置条件: 经纪人有房源
测试步骤:
  1. 进入"我的房源"页面
  2. 查看不同状态标签：全部/审核中/已上架/已下架/已售
  3. 下拉刷新
  4. 上拉加载更多
预期结果:
  1. 展示经纪人录入的所有房源
  2. 按状态分类展示
  3. 显示房源基本信息、浏览量、咨询量
  4. 支持下拉刷新和上拉加载
优先级: P0

用例ID: TC-B-032
模块: B端房源管理-状态变更
标题: 房源上下架操作
前置条件: 有已上架房源
测试步骤:
  1. 选择房源点击"下架"
  2. 确认下架
  3. 选择已下架房源点击"上架"
预期结果:
  1. 下架后房源不在C端展示
  2. 上架后房源重新展示
  3. 状态变更记录日志
优先级: P0

用例ID: TC-B-033
模块: B端房源管理-状态变更
标题: 标记已售/已租
前置条件: 有已上架房源
测试步骤:
  1. 选择房源点击"标记已售"
  2. 填写成交价格和成交日期
  3. 确认
预期结果:
  1. 房源状态变为"已售"
  2. 不再在C端展示
  3. 成交信息用于数据统计
优先级: P0

用例ID: TC-B-034
模块: B端房源管理-编辑
标题: 房源信息编辑
前置条件: 有审核通过或已下架房源
测试步骤:
  1. 选择房源点击"编辑"
  2. 修改价格
  3. 修改描述
  4. 添加新图片
  5. 提交修改
预期结果:
  1. 审核通过的房源编辑后需重新审核
  2. 已下架房源编辑后可直接上架
  3. 重大修改（价格、面积）触发重新验真
优先级: P0

用例ID: TC-B-035
模块: B端房源管理-刷新
标题: 房源刷新功能
前置条件: 有已上架房源
测试步骤:
  1. 点击"刷新"
  2. 确认使用刷新次数
预期结果:
  1. 刷新后房源排序权重提升
  2. 每日刷新次数有限制
  3. 刷新记录可追溯
优先级: P1

用例ID: TC-B-036
模块: B端房源管理-推广
标题: 房源推广功能
前置条件: 有已上架房源（二期功能）
测试步骤:
  1. 选择房源点击"推广"
  2. 选择推广位置：首页推荐/搜索置顶等
  3. 设置推广时长
  4. 支付推广费用
预期结果:
  1. 推广房源获得更高曝光
  2. 按竞价排名或固定费用计费
  3. 推广效果可追踪
优先级: P2

