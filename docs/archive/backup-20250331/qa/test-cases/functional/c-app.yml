# C端APP功能测试用例
# 覆盖模块：账号、首页、搜索、地图、详情、IM、预约、个人中心

---
# ==================== 账号模块 ====================

用例ID: TC-C-001
模块: C端账号-注册
标题: 手机号注册成功
前置条件: 手机号未注册，网络正常
测试步骤:
  1. 打开APP，点击"我的"
  2. 点击"登录/注册"
  3. 输入有效的缅甸手机号（+959123456789）
  4. 点击"获取验证码"
  5. 等待接收短信验证码
  6. 输入正确的6位验证码
  7. 点击"注册"
预期结果:
  1. 验证码发送成功，提示"验证码已发送"
  2. 注册成功，自动登录
  3. 跳转到首页
  4. 生成用户ID和token
  5. 记录用户注册渠道
优先级: P0

用例ID: TC-C-002
模块: C端账号-注册
标题: 手机号格式校验
前置条件: 网络正常
测试步骤:
  1. 输入无效手机号：9591234567（10位）
  2. 输入无效手机号：+951234567890（12位）
  3. 输入无效手机号：abc123456789
  4. 输入非缅甸号码：+8613800138000
  5. 输入空值
  6. 输入包含特殊字符的号码：+95912345678@
预期结果:
  1. 所有无效格式都被拦截，提示"请输入有效的缅甸手机号"
  2. 获取验证码按钮不可用
优先级: P0

用例ID: TC-C-003
模块: C端账号-注册
标题: 验证码错误重试限制
前置条件: 手机号未注册
测试步骤:
  1. 输入有效手机号获取验证码
  2. 连续输入5次错误验证码
  3. 第6次输入正确验证码
预期结果:
  1. 前5次提示"验证码错误"
  2. 第5次错误后提示"验证码错误次数过多，请30分钟后重试"
  3. 第6次即使正确也无法提交，按钮置灰
优先级: P1

用例ID: TC-C-004
模块: C端账号-注册
标题: 验证码过期处理
前置条件: 手机号未注册
测试步骤:
  1. 输入有效手机号获取验证码
  2. 等待6分钟（超过5分钟有效期）
  3. 输入原验证码
预期结果:
  1. 提示"验证码已过期，请重新获取"
  2. 可重新获取验证码
优先级: P1

用例ID: TC-C-005
模块: C端账号-注册
标题: 重复注册处理
前置条件: 手机号已注册
测试步骤:
  1. 输入已注册的手机号
  2. 点击获取验证码
  3. 输入验证码
  4. 点击注册
预期结果:
  1. 提示"该手机号已注册，请直接登录"
  2. 自动跳转到登录页
优先级: P0

用例ID: TC-C-006
模块: C端账号-登录
标题: 验证码登录成功
前置条件: 手机号已注册
测试步骤:
  1. 打开登录页
  2. 输入已注册手机号
  3. 获取验证码
  4. 输入正确验证码
  5. 点击登录
预期结果:
  1. 登录成功
  2. 生成新的token，有效期30天
  3. 跳转到首页
优先级: P0

用例ID: TC-C-007
模块: C端账号-登录
标题: 多设备登录限制
前置条件: 手机号已注册
测试步骤:
  1. 在设备A登录
  2. 在设备B登录
  3. 在设备C登录
  4. 在设备D尝试登录
预期结果:
  1. 设备A、B、C登录成功
  2. 设备D登录时提示"登录设备数已达上限（3台），请先在其他设备退出"
  3. 或提供踢出其他设备的选项
优先级: P1

用例ID: TC-C-008
模块: C端账号-实名认证
标题: 实名认证成功流程
前置条件: 用户已登录，未认证
测试步骤:
  1. 进入"我的"页面
  2. 点击"实名认证"
  3. 输入真实姓名（缅语或英文）
  4. 输入身份证号
  5. 上传身份证正面照片
  6. 上传身份证反面照片（可选）
  7. 提交认证
预期结果:
  1. OCR自动识别身份证信息
  2. 提交成功，显示"审核中"状态
  3. 预计审核时间T+1工作日
  4. 审核通过后显示"已认证"
优先级: P0

用例ID: TC-C-009
模块: C端账号-实名认证
标题: 身份证已被绑定处理
前置条件: 身份证A已绑定用户A
测试步骤:
  1. 用户B使用身份证A提交认证
预期结果:
  1. 提示"该身份证已绑定其他账号"
  2. 提供"申诉解绑"入口
优先级: P1

用例ID: TC-C-010
模块: C端账号-第三方登录
标题: Facebook登录
前置条件: 设备已安装Facebook
测试步骤:
  1. 点击"Facebook登录"
  2. 授权APP获取基本信息
  3. 首次登录需绑定手机号
  4. 输入手机号获取验证码
  5. 完成绑定
预期结果:
  1. 首次登录成功并绑定手机号
  2. 后续可直接Facebook登录
优先级: P1

用例ID: TC-C-011
模块: C端账号-安全
标题: 异常登录检测
前置条件: 用户已在设备A登录
测试步骤:
  1. 在新设备B登录
预期结果:
  1. 设备B需短信验证
  2. 设备A收到"新设备登录"提醒Push
  3. 设备A可一键登出其他设备
优先级: P1

