  2. 下拉刷新
  3. 上拉加载更多
预期结果:
  1. 默认展示基于LBS的推荐房源
  2. Banner轮播正常展示
  3. 快捷入口（买房/租房/发布/地图）正常显示
  4. 房源列表按热度+新鲜度+距离排序
  5. 分页加载正常，每页20条
优先级: P0

用例ID: TC-C-022
