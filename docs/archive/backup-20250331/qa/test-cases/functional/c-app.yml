  2. 选择镇区：Tamwe
  3. 选择价格区间：5000-10000万缅币
  4. 选择面积区间：90-120平米
  5. 选择户型：3室
  6. 选择房源类型：公寓
  7. 点击搜索
预期结果:
  1. 筛选条件正确应用到搜索
  2. 返回符合条件的房源列表
  3. 结果数正确显示
  4. 每个房源显示标签、价格、面积、户型等信息
