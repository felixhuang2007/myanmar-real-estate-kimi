测试步骤:
  1. 点击Banner
  2. 测试不同类型跳转：房源详情、搜索结果页、H5页面
预期结果:
  1. 点击正常跳转对应页面
  2. 跳转前记录点击埋点
优先级: P1

用例ID: TC-C-024
模块: C端首页
标题: 快捷入口功能
前置条件: 首页正常加载
测试步骤:
  1. 点击"买房"快捷入口
  2. 点击"租房"快捷入口
  3. 点击"发布"快捷入口
  4. 点击"地图找房"快捷入口
预期结果:
  1. 买房：跳转到二手房搜索页，默认筛选出售
  2. 租房：跳转到租房搜索页，默认筛选出租
